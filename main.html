<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pinterest Hero Section</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Hero container */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 100vh;
    }

    /* Image section */
    .hero img {
      width: 65%;
      height: 100%;
      object-fit: cover;
    }

    /* Content section */
    .hero-content {
      width: 35%;
      padding: 40px;
      box-sizing: border-box;
    }

    .hero-content h1 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    .hero-content p {
      font-size: 16px;
      color: #555;
      margin-bottom: 25px;
    }

    /* Explore button */
    .hero-content a {
      display: inline-block;
      padding: 12px 24px;
      background-color: #e60023;
      color: #ffffff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="hero">
    <img
      src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"
      alt="Nature Image"
    />

    <div class="hero-content">
      <h1>Welcome to my Pinterest clone</h1>
      <p>Discover new inspiration and save your favorite ideas</p>
      <a href="#">Explore now</a>
    </div>
  </div>

</body>
</html>
